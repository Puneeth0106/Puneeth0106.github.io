<section class="section pointer" id="achievement"><div class="container z-1"><div class="row justify-content-center txt-bg txt-bg-achievement"><div class=col-lg-6><div class="wow fadeIn section-title text-center mb-4 pb-2"><div class="mb-5 pb-3"> <i class="fas fa-trophy h1 text-muted"></i></div><h2 class="h3 font-weight-bold">My Achievements</h2><p class="text-muted mx-auto mb-0 mt-4 para-desc">Some of my Accomplishment.</p></div></div></div><div class="container-ach"><ng-container *ngFor="let card of achievementData"><a *ngIf="card['link']" href="{{card['link']}}" target="_blank" rel="noreferrer" [attr.aria-label]="card['description'] + ' (opens in a new tab)'" class="box wow zoomIn{{card['animationClass']}}" data-wow-delay="0.5s"><h3 class="description pl-1 h2"> {{card['description']}} </h3><img src="assets/images/achievement/{{card['image']}}.webp" class="ach-img" alt="{{card['description']}}" loading="lazy" title="{{card['image']}}"></a><div *ngIf="!card['link']" class="box wow zoomIn{{card['animationClass']}}" data-wow-delay="0.5s"><h3 class="description pl-1 h2"> {{card['description']}} </h3><img src="assets/images/achievement/{{card['image']}}.webp" class="ach-img" alt="{{card['description']}}" loading="lazy" title="{{card['image']}}"></div></ng-container></div><div class="gallery-section mt-5"><h3 class="text-center wow fadeIn mb-5"><strong>Academic &amp; Research Gallery</strong></h3><div class="gallery-grid"><div *ngFor="let photo of galleryData; let i = index" class="gallery-item wow fadeIn" [attr.data-wow-delay]="(i * 0.1) + 's'"><img src="assets/images/gallery/{{photo['image']}}.webp" alt="Gallery photo {{i+1}}" loading="lazy"></div></div></div></div></section>
